<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe — Sign In</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .auth-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .divider {
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      margin: 4px 0 16px;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">✦ Vibe</div>
    <p class="auth-subtitle">Your space to share moments</p>

    <form id="login-form">
      <div class="input-group">
        <label>Email</label>
        <input class="input" type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input class="input" type="password" id="password" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary btn-full" type="submit" id="login-btn">Sign In</button>
    </form>

    <p class="divider" style="margin-top:20px">or</p>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    redirectIfLoggedIn();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const data = await apiPost('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        const { token, ...user } = data;
        setAuth(user, token);
        window.location.href = 'feed.html';
      } catch (err) {
        toast(err.message, 'error');
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
